<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacra Lux Remote</title>
  <link rel="stylesheet" href="/static/fonts/google-fonts.css" />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    .shell {
      padding: 0.9rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .top {
      margin-bottom: 0.75rem;
    }

    .preview-dock {
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding-top: max(0.35rem, env(safe-area-inset-top));
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      box-sizing: border-box;
      margin-bottom: 0.8rem;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--bg), white 8%) 0%, color-mix(in srgb, var(--bg), transparent 4%) 82%, transparent 100%);
      backdrop-filter: blur(10px);
    }

    .cue-list {
      display: grid;
      gap: 0.45rem;
      max-height: 55vh;
      overflow: auto;
    }

    .cue-btn {
      width: 100%;
      text-align: left;
      padding: 0.7rem 0.85rem;
      font-size: 0.9rem;
      line-height: 1.3;
      border-radius: 10px;
      transition: background 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .cue-btn:active {
      transform: scale(0.97);
      background: var(--pressed-bg);
    }

    .cue-btn.active {
      border-color: var(--accent);
      background: var(--active-bg);
      font-weight: 700;
    }

    /* ── Grouped slide list ───────────────────────────────────────── */
    .cue-group {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }

    .cue-group.group-active {
      border-color: var(--accent);
    }

    .cue-group-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.7rem 0.85rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .cue-group-summary::-webkit-details-marker {
      display: none;
    }

    .cue-group.group-active>.cue-group-summary {
      background: var(--active-bg);
      color: var(--accent);
    }

    .cue-group-summary::after {
      content: '▾';
      font-size: 1rem;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .cue-group[open]>.cue-group-summary::after {
      transform: rotate(-180deg);
    }

    .cue-group-count {
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--line);
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      margin-left: auto;
      color: var(--ink-soft);
    }

    .cue-group-body {
      display: grid;
      gap: 0.3rem;
      padding: 0 0.5rem 0.5rem;
    }

    .sub-cue {
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
    }

    /* ── Live screen preview ──────────────────────────────────────────── */
    .screen-preview-wrap {
      margin: 0 auto 0.65rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      /* 16:9 aspect-ratio container */
      position: relative;
      width: calc(100% - 1.1rem);
      max-width: 100%;
      aspect-ratio: 16 / 9;
      background: #050505;
      cursor: pointer;
      touch-action: pan-y;
      user-select: none;
    }

    .screen-preview-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      /* iframe is rendered at 1920px wide then scaled down */
      width: 1920px;
      height: 1080px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }

    .screen-preview-touch {
      position: absolute;
      inset: 0;
      z-index: 2;
      touch-action: pan-y;
      background: transparent;
    }

    .screen-preview-wrap::before,
    .screen-preview-wrap::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 18%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .screen-preview-wrap::before {
      left: 0;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.22), transparent);
    }

    .screen-preview-wrap::after {
      right: 0;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.22), transparent);
    }

    .screen-preview-wrap:active::before,
    .screen-preview-wrap:active::after {
      opacity: 1;
    }

    .preview-carousel {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 0.65rem;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      aspect-ratio: 32 / 9;
      touch-action: pan-y;
      user-select: none;
      cursor: grab;
      overflow: hidden;
      contain: layout paint;
    }

    .carousel-track.dragging {
      cursor: grabbing;
    }

    .carousel-track.animating .carousel-card {
      transition:
        transform var(--carousel-glide-duration, 320ms) cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.24s ease;
    }

    .carousel-track.dragging .carousel-card,
    .carousel-track.spinning .carousel-card {
      transition: transform 0.12s linear, opacity 0.16s ease;
    }

    .carousel-card {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 6px 16px var(--shadow);
      transition: transform 0.12s ease, opacity 0.2s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      will-change: transform, opacity;
      backface-visibility: hidden;
      contain: layout paint;
    }

    .carousel-card.cache {
      opacity: 0;
      pointer-events: none;
    }

    .carousel-card.side {
      opacity: 0.96;
    }

    .carousel-card.center {
      z-index: 1;
      box-shadow: 0 10px 22px var(--shadow);
    }

    .carousel-card.selected {
      border-color: color-mix(in srgb, var(--accent), white 18%);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent), white 52%), 0 10px 22px var(--shadow);
    }

    .carousel-card.carousel-card-empty {
      opacity: 0;
      pointer-events: none;
    }

    .carousel-card:active {
      transform: scale(0.98);
    }

    .carousel-card.active {
      border-color: var(--accent);
      box-shadow: 0 10px 22px var(--shadow);
    }

    .carousel-thumb-wrap {
      position: absolute;
      inset: 0;
      background: #050505;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .carousel-thumb-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
      backface-visibility: hidden;
    }

    .carousel-empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 0.8rem;
      color: var(--ink-soft);
      text-align: center;
      font-size: 0.8rem;
      margin-bottom: 0.7rem;
    }

    /* ── Section headers in organizer list ───────────────────────────── */
    .phase-section-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.9rem 0.2rem 0.4rem;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .phase-section-header::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--phase-line), var(--line));
    }

    .phase-section {
      display: grid;
      gap: 0.3rem;
    }
  </style>
</head>

<body>
  <main class="shell">
    <section id="blackSection" style="padding: 0.5rem 0.9rem; display:grid; grid-template-columns:1fr 1fr; gap:0.5rem">
      <button id="interstitialBtn" class="danger" style="font-size:0.82rem">Interstitial Slide</button>
      <button id="nextSectionBtn" class="primary" style="font-size:0.82rem">Next Section</button>
    </section>

    <section id="titleSection" class="top card" style="padding: 0.8rem">
      <p id="title" style="margin: 0; text-align: center; font-weight: 700; font-size: 0.95rem; line-height: 1.3;">No
        presentation loaded.</p>
    </section>

    <section class="preview-dock" id="previewDock">
      <div class="screen-preview-wrap" id="screenPreviewWrap">
        <iframe id="screenFrame" src="/screen" title="Live screen output"></iframe>
        <div class="screen-preview-touch" id="screenPreviewTouch" aria-hidden="true"></div>
      </div>

      <section class="preview-carousel" id="previewCarousel" hidden>
        <div
          id="carouselTrack"
          class="carousel-track"
          tabindex="0"
          role="region"
          aria-label="Slide preview carousel. Use left and right arrow keys to move between slides."></div>
      </section>

    </section>

    <section class="card" style="padding: 0.55rem">
      <div id="cueList" class="cue-list"></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const supportsPointerEvents = "PointerEvent" in window;
    const els = {
      title: document.getElementById("title"),
      cueList: document.getElementById("cueList"),
      interstitialBtn: document.getElementById("interstitialBtn"),
      nextSectionBtn: document.getElementById("nextSectionBtn"),
      previewDock: document.getElementById("previewDock"),
      previewCarousel: document.getElementById("previewCarousel"),
      carouselTrack: document.getElementById("carouselTrack"),
      screenPreviewWrap: document.getElementById("screenPreviewWrap"),
      screenPreviewTouch: document.getElementById("screenPreviewTouch"),
      screenFrame: document.getElementById("screenFrame")
    };

    const CAROUSEL_VISIBLE_COUNT = 5;
    const CAROUSEL_SLOT_LEFT_RATIOS = [-0.75, -0.25, 0.25, 0.75, 1.25];
    const CAROUSEL_SLOT_CLASS_NAMES = [
      "carousel-card cache cache-left",
      "carousel-card side side-left",
      "carousel-card center",
      "carousel-card side side-right",
      "carousel-card cache cache-right"
    ];
    const CAROUSEL_DRAG_GAIN = 1.85;
    const CAROUSEL_SETTLE_RATIO = 0.1;
    const CAROUSEL_EDGE_OVERSCROLL_RATIO = 1.1;
    const CAROUSEL_MOMENTUM_DECAY = 0.9984;
    const CAROUSEL_MIN_VELOCITY = 0.0035;
    const GESTURE_AXIS_LOCK_PX = 4;
    const CAROUSEL_SWIPE_ACTIVATION_PX = 6;
    const PREVIEW_SWIPE_TRIGGER_PX = 22;
    const PREVIEW_SWIPE_DOMINANCE_RATIO = 1.12;
    const CAROUSEL_GLIDE_DURATION_MS = 320;
    const CAROUSEL_GLIDE_OVERSHOOT_RATIO = 0.08;

    // ── Live screen preview scaling ──────────────────────────────────────────
    function scalePreviewIframe() {
      const scale = els.screenPreviewWrap.clientWidth / 1920;
      els.screenFrame.style.transform = `scale(${scale})`;
      document.querySelectorAll(".carousel-thumb-frame").forEach((frame) => {
        const wrap = frame.parentElement;
        if (!wrap) return;
        const thumbScale = wrap.clientWidth / 1920;
        frame.style.transform = `scale(${thumbScale})`;
      });
    }

    window.addEventListener("resize", scalePreviewIframe);
    requestAnimationFrame(scalePreviewIframe);

    // Scroll so the live screen preview is at the top of the viewport on load,
    // leaving the title and top buttons scrolled above it.
    requestAnimationFrame(() => {
      if (els.previewDock) {
        const previewTop = els.previewDock.getBoundingClientRect().top + window.scrollY;
        window.scrollTo({ top: Math.max(0, Math.round(previewTop)), behavior: "auto" });
      }
    });

    let interstitialHoldActive = false;
    let currentSlides = [];
    let currentActive = 0;
    let carouselFocusIndex = 0;
    let carouselSelectedIndex = 0;
    let latestState = null;
    let lastCarouselTap = { index: null, at: 0 };
    let carouselDragStartX = null;
    let carouselDragStartY = null;
    let carouselLastPointerX = null;
    let carouselLastPointerAt = 0;
    let carouselDragOffset = 0;
    let carouselVelocity = 0;
    let carouselMomentumFrame = null;
    let carouselGestureAxis = null;
    let carouselDidSwipe = false;
    let suppressCarouselClickUntil = 0;
    let carouselAnimationTimeout = null;
    let previewSwipeStartX = null;
    let previewSwipeStartY = null;
    let _preMassRunning = false;
    let _currentPhase = null;
    let lastRenderedActive = null;
    let carouselSlots = [];
    let previewPinFrame = null;
    let suppressNextCarouselAnimation = false;
    let hasRenderedSocketState = false;

    // Theme application for remote UI — loaded from server
    let _remoteThemes = {};
    let _currentTheme = "carmelite";
    fetch("/api/theme-vars").then(r => r.json()).then(data => {
      _remoteThemes = data.themes;
      applyRemoteTheme(data.current);
    }).catch(() => { });

    function applyRemoteTheme(themeId) {
      const theme = _remoteThemes[themeId];
      if (!theme || themeId === _currentTheme) return;
      _currentTheme = themeId;
      const root = document.documentElement;
      for (const [prop, val] of Object.entries(theme.vars)) {
        root.style.setProperty(prop, val);
      }
      root.style.colorScheme = theme.colorScheme || "light";
    }

    function clampCarouselFocus(index) {
      if (!Number.isFinite(index)) {
        return 0;
      }
      return Math.max(0, Math.min(index, Math.max(0, currentSlides.length - 1)));
    }

    function getCarouselIndex(index) {
      if (index < 0 || index >= currentSlides.length) {
        return null;
      }
      return index;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function goToRemoteSlide(index) {
      if (!Number.isFinite(index)) {
        return;
      }
      socket.emit("slide:goto:remote", index);
    }

    function stepRemoteSlide(step) {
      if (!Number.isFinite(step) || !currentSlides.length) {
        return;
      }
      const nextIndex = currentActive + step;
      if (nextIndex < 0 || nextIndex >= currentSlides.length) {
        return;
      }
      goToRemoteSlide(nextIndex);
    }

    function ensureCarouselWindow(activeIndex) {
      if (!currentSlides.length) {
        carouselFocusIndex = 0;
        carouselSelectedIndex = 0;
        return;
      }
      const clampedActiveIndex = clampCarouselFocus(activeIndex);
      const selectedOutOfRange = carouselSelectedIndex < 0 || carouselSelectedIndex >= currentSlides.length;
      const focusOutOfRange = carouselFocusIndex < 0 || carouselFocusIndex >= currentSlides.length;
      if (selectedOutOfRange) {
        carouselSelectedIndex = clampedActiveIndex;
      }
      if (focusOutOfRange) {
        carouselFocusIndex = carouselSelectedIndex;
      }
    }

    function getCarouselSlotWidth() {
      return els.carouselTrack.clientWidth * 0.5;
    }

    function stopCarouselMomentum() {
      if (carouselMomentumFrame != null) {
        cancelAnimationFrame(carouselMomentumFrame);
        carouselMomentumFrame = null;
      }
      els.carouselTrack.classList.remove("spinning");
    }

    function sendPreviewToFrame(frame, slide) {
      if (!frame?.contentWindow || !slide) return;
      const previewPayloadSignature = JSON.stringify({
        slide,
        screenSettings: latestState?.screenSettings || {}
      });
      if (frame.dataset.previewPayloadSignature === previewPayloadSignature) {
        return;
      }
      frame.contentWindow.postMessage({
        type: "preview_update",
        slide,
        screenSettings: { ...(latestState?.screenSettings || {}) }
      }, "*");
      frame.dataset.previewPayloadSignature = previewPayloadSignature;
    }

    function ensureCarouselSlots() {
      if (carouselSlots.length) {
        return carouselSlots;
      }
      els.carouselTrack.innerHTML = Array.from({ length: CAROUSEL_VISIBLE_COUNT }, (_, slotIndex) => `
        <div class="${CAROUSEL_SLOT_CLASS_NAMES[slotIndex]} carousel-card-empty" aria-hidden="true">
          <div class="carousel-thumb-wrap">
            <iframe class="carousel-thumb-frame" src="/screen?preview=1" title="Slide preview"></iframe>
          </div>
        </div>
      `).join("");
      carouselSlots = Array.from(els.carouselTrack.querySelectorAll(".carousel-card"));
      carouselSlots.forEach((card) => {
        const frame = card.querySelector(".carousel-thumb-frame");
        frame?.addEventListener("load", () => {
          const slideIndex = Number(card.dataset.index);
          if (!Number.isFinite(slideIndex)) {
            return;
          }
          const slide = currentSlides.find((item) => item.index === slideIndex);
          if (slide) {
            sendPreviewToFrame(frame, slide);
          }
        });
      });
      return carouselSlots;
    }

    function positionCarouselCards() {
      const trackWidth = els.carouselTrack.clientWidth;
      ensureCarouselSlots().forEach((card, slotIndex) => {
        const translateX = (trackWidth * CAROUSEL_SLOT_LEFT_RATIOS[slotIndex]) + carouselDragOffset;
        card.style.transform = `translate3d(${translateX}px, 0, 0)`;
      });
    }

    function clearCarouselAnimation() {
      if (carouselAnimationTimeout != null) {
        clearTimeout(carouselAnimationTimeout);
        carouselAnimationTimeout = null;
      }
      els.carouselTrack.style.removeProperty("--carousel-glide-duration");
      els.carouselTrack.classList.remove("animating");
    }

    function shiftCarouselWindowIfNeeded() {
      const slotWidth = getCarouselSlotWidth();
      if (!slotWidth || !currentSlides.length) {
        return;
      }
      let shifted = false;
      while (carouselDragOffset <= -slotWidth && carouselFocusIndex < currentSlides.length - 1) {
        carouselDragOffset += slotWidth;
        carouselFocusIndex += 1;
        carouselSelectedIndex = carouselFocusIndex;
        shifted = true;
      }
      while (carouselDragOffset >= slotWidth && carouselFocusIndex > 0) {
        carouselDragOffset -= slotWidth;
        carouselFocusIndex -= 1;
        carouselSelectedIndex = carouselFocusIndex;
        shifted = true;
      }
      if (!shifted) {
        const maxOverscroll = slotWidth * CAROUSEL_EDGE_OVERSCROLL_RATIO;
        if (carouselFocusIndex === 0 && carouselDragOffset > 0) {
          carouselDragOffset = Math.min(carouselDragOffset, maxOverscroll);
        }
        if (carouselFocusIndex === currentSlides.length - 1 && carouselDragOffset < 0) {
          carouselDragOffset = Math.max(carouselDragOffset, -maxOverscroll);
        }
        return;
      }
      renderCarousel();
    }

    function settleCarousel() {
      stopCarouselMomentum();
      const slotWidth = getCarouselSlotWidth();
      if (!slotWidth || !currentSlides.length) {
        carouselDragOffset = 0;
        positionCarouselCards();
        return;
      }
      if (carouselDragOffset <= -(slotWidth * CAROUSEL_SETTLE_RATIO) && carouselFocusIndex < currentSlides.length - 1) {
        carouselFocusIndex += 1;
        carouselSelectedIndex = carouselFocusIndex;
      } else if (carouselDragOffset >= slotWidth * CAROUSEL_SETTLE_RATIO && carouselFocusIndex > 0) {
        carouselFocusIndex -= 1;
        carouselSelectedIndex = carouselFocusIndex;
      }
      carouselDragOffset = 0;
      renderCarousel();
      positionCarouselCards();
    }

    function startCarouselMomentum() {
      stopCarouselMomentum();
      if (Math.abs(carouselVelocity) < CAROUSEL_MIN_VELOCITY) {
        settleCarousel();
        return;
      }
      els.carouselTrack.classList.add("spinning");
      let lastFrameAt = performance.now();
      const step = (frameAt) => {
        const dt = Math.min(frameAt - lastFrameAt, 32);
        lastFrameAt = frameAt;
        carouselDragOffset += carouselVelocity * dt;
        shiftCarouselWindowIfNeeded();
        positionCarouselCards();
        carouselVelocity *= Math.pow(CAROUSEL_MOMENTUM_DECAY, dt);
        if (Math.abs(carouselVelocity) < CAROUSEL_MIN_VELOCITY) {
          settleCarousel();
          return;
        }
        carouselMomentumFrame = requestAnimationFrame(step);
      };
      carouselMomentumFrame = requestAnimationFrame(step);
    }

    function renderCarousel() {
      if (!currentSlides.length) {
        stopCarouselMomentum();
        carouselDragOffset = 0;
        els.previewCarousel.hidden = true;
        ensureCarouselSlots().forEach((card, slotIndex) => {
          card.className = `${CAROUSEL_SLOT_CLASS_NAMES[slotIndex]} carousel-card-empty`;
          card.removeAttribute("data-index");
          card.setAttribute("aria-hidden", "true");
          card.style.transform = "";
        });
        return;
      }

      els.previewCarousel.hidden = false;
      carouselFocusIndex = clampCarouselFocus(carouselFocusIndex);
      carouselSelectedIndex = clampCarouselFocus(carouselSelectedIndex);
      const visibleIndices = [
        getCarouselIndex(carouselFocusIndex - 2),
        getCarouselIndex(carouselFocusIndex - 1),
        getCarouselIndex(carouselFocusIndex),
        getCarouselIndex(carouselFocusIndex + 1),
        getCarouselIndex(carouselFocusIndex + 2)
      ];
      ensureCarouselSlots().forEach((card, slotIndex) => {
        const slideIndex = visibleIndices[slotIndex];
        const frame = card.querySelector(".carousel-thumb-frame");
        card.className = CAROUSEL_SLOT_CLASS_NAMES[slotIndex];
        if (slideIndex == null) {
          card.classList.add("carousel-card-empty");
          card.removeAttribute("data-index");
          card.setAttribute("aria-hidden", "true");
          delete frame.dataset.previewPayloadSignature;
          return;
        }
        const slide = currentSlides[slideIndex];
        card.dataset.index = String(slide.index);
        card.setAttribute("aria-hidden", card.classList.contains("cache") ? "true" : "false");
        if (slide.index === currentActive) {
          card.classList.add("active");
        }
        if (slide.index === carouselSelectedIndex) {
          card.classList.add("selected");
        }
        requestAnimationFrame(() => sendPreviewToFrame(frame, slide));
      });

      positionCarouselCards();
      requestAnimationFrame(scalePreviewIframe);
    }

    function render(state) {
      // Apply theme
      const previousActive = currentActive;
      const hadSlides = currentSlides.length > 0;
      latestState = state;
      applyRemoteTheme(state.appSettings?.theme || "carmelite");
      interstitialHoldActive = Boolean(state.interstitialHoldActive);
      currentSlides = state.presentation?.slides || [];
      currentActive = Number(state.currentSlideIndex) || 0;
      ensureCarouselWindow(currentActive);
      _preMassRunning = Boolean(state.preMassRunning);
      _currentPhase = currentSlides[currentActive]?.phase || null;
      const cues = currentSlides;
      const active = currentActive;
      const hasInterstitial = currentSlides.some((slide) => slide.type === "interstitial");

      els.title.textContent = state.presentation?.title || "No presentation";
      els.interstitialBtn.textContent = interstitialHoldActive ? "Return to Slide" : "Interstitial Slide";
      els.interstitialBtn.disabled = !hasInterstitial;

      // Update Next Section button — becomes "Start Mass" during pre/post phases
      const isPreOrPost = _preMassRunning || _currentPhase === "pre" || _currentPhase === "post";
      els.nextSectionBtn.textContent = isPreOrPost ? "Start Mass" : "Next Section";

      const shouldAnimateCarousel =
        hadSlides &&
        currentSlides.length > 1 &&
        Math.abs(currentActive - previousActive) === 1 &&
        carouselDragStartX == null &&
        carouselMomentumFrame == null &&
        !suppressNextCarouselAnimation;

      suppressNextCarouselAnimation = false;

      if (shouldAnimateCarousel) {
        animateCarouselSlideChange(previousActive, currentActive);
      } else {
        carouselFocusIndex = clampCarouselFocus(currentActive);
        carouselSelectedIndex = clampCarouselFocus(currentActive);
        clearCarouselAnimation();
        carouselDragOffset = 0;
        renderCarousel();
      }
      lastRenderedActive = currentActive;
      els.cueList.innerHTML = buildCueListHtml(cues, active);

      // Scroll so the active item is at the top of the list.
      // If it's inside a group, account for the summary header height.
      const activeBtn = els.cueList.querySelector(".cue-btn.active");
      if (activeBtn) {
        const list = els.cueList;
        const listTop = list.getBoundingClientRect().top;
        const btnTop = activeBtn.getBoundingClientRect().top;
        const summary = activeBtn.closest("details")?.querySelector("summary");
        const summaryH = summary ? summary.getBoundingClientRect().height : 0;
        list.scrollTop += (btnTop - listTop) - summaryH;
      }
    }

    function animateCarouselSlideChange(previousActiveIndex, nextActiveIndex) {
      clearCarouselAnimation();
      const direction = nextActiveIndex > previousActiveIndex ? 1 : -1;
      const slotWidth = getCarouselSlotWidth();
      if (!slotWidth) {
        renderCarousel();
        return;
      }

      const didNeedRealign =
        carouselFocusIndex !== clampCarouselFocus(previousActiveIndex) ||
        carouselSelectedIndex !== clampCarouselFocus(previousActiveIndex);
      carouselFocusIndex = clampCarouselFocus(previousActiveIndex);
      carouselSelectedIndex = clampCarouselFocus(previousActiveIndex);
      carouselDragOffset = 0;
      if (didNeedRealign) {
        renderCarousel();
      }

      requestAnimationFrame(() => {
        els.carouselTrack.style.setProperty("--carousel-glide-duration", `${CAROUSEL_GLIDE_DURATION_MS}ms`);
        els.carouselTrack.classList.add("animating");
        carouselDragOffset = -direction * slotWidth * (1 + CAROUSEL_GLIDE_OVERSHOOT_RATIO);
        positionCarouselCards();
      });

      carouselAnimationTimeout = window.setTimeout(() => {
        els.carouselTrack.classList.remove("animating");
        els.carouselTrack.style.removeProperty("--carousel-glide-duration");
        carouselAnimationTimeout = null;
        carouselFocusIndex = clampCarouselFocus(nextActiveIndex);
        carouselSelectedIndex = clampCarouselFocus(nextActiveIndex);
        carouselDragOffset = 0;
        renderCarousel();
      }, CAROUSEL_GLIDE_DURATION_MS);
    }

    socket.on("state:update", (state) => {
      hasRenderedSocketState = true;
      render(state);
    });
    socket.on("interstitial:hold:error", ({ error }) => {
      if (error) {
        els.title.textContent = error;
      }
    });

    const PHASE_LABELS = {
      pre: "Pre-Mass Announcements",
      gathering: "Gathering",
      mass: "Mass",
      post: "Post-Mass Announcements"
    };

    function buildCueListHtml(cues, active) {
      // Group consecutive cues by organizerItemId
      const groups = [];
      for (const cue of cues) {
        const gid = cue.organizerItemId || cue.id;
        if (groups.length && groups[groups.length - 1].id === gid) {
          groups[groups.length - 1].cues.push(cue);
        } else {
          groups.push({ id: gid, cues: [cue], phase: cue.phase || "mass" });
        }
      }

      // Group the organizer groups into phase sections
      const phaseSections = [];
      let lastPhase = null;
      for (const group of groups) {
        if (group.phase !== lastPhase) {
          lastPhase = group.phase;
          phaseSections.push({ phase: group.phase, groups: [] });
        }
        phaseSections[phaseSections.length - 1].groups.push(group);
      }

      return phaseSections.map((section) => {
        const groupsHtml = section.groups.map((group) => {
          const isMulti = group.cues.length > 1;
          const hasActive = group.cues.some((c) => c.index === active);

          if (!isMulti) {
            const cue = group.cues[0];
            const label = escapeHtml(cue.groupLabel || cue.title);
            return `<button class="cue-btn${hasActive ? " active" : ""}" data-index="${cue.index}">${label}</button>`;
          }

          const first = group.cues[0];
          const groupName = escapeHtml(first.groupLabel || first.title.replace(/ \(\d+\/\d+\)$/, ""));
          const subHtml = group.cues.map((cue) => {
            const isActive = cue.index === active;
            return `<button class="cue-btn sub-cue${isActive ? " active" : ""}" data-index="${cue.index}">${escapeHtml(cue.title)}</button>`;
          }).join("");

          return `<details class="cue-group${hasActive ? " group-active" : ""}"${hasActive ? " open" : ""}>
            <summary class="cue-group-summary">
              ${groupName}
              <span class="cue-group-count">${group.cues.length} slides</span>
            </summary>
            <div class="cue-group-body">${subHtml}</div>
          </details>`;
        }).join("");

        const label = escapeHtml(PHASE_LABELS[section.phase] || section.phase);
        return `<div class="phase-section"><div class="phase-section-header">${label}</div>${groupsHtml}</div>`;
      }).join("");
    }

    function getPreviewDockTop() {
      return els.previewDock.getBoundingClientRect().top + window.scrollY;
    }

    function pinPreviewDock(behavior = "auto") {
      const previewTop = getPreviewDockTop();
      window.scrollTo({
        top: Math.max(0, Math.round(previewTop)),
        behavior
      });
    }

    function stopPreviewPinning() {
      if (previewPinFrame != null) {
        cancelAnimationFrame(previewPinFrame);
        previewPinFrame = null;
      }
    }

    function maintainPreviewPinning(durationMs = 180) {
      stopPreviewPinning();
      const startedAt = performance.now();
      const step = () => {
        pinPreviewDock();
        if (performance.now() - startedAt < durationMs) {
          previewPinFrame = requestAnimationFrame(step);
        } else {
          previewPinFrame = null;
        }
      };
      previewPinFrame = requestAnimationFrame(step);
    }

    function scrollToPreview() {
      pinPreviewDock("smooth");
    }

    function isEditableTarget(target) {
      if (!(target instanceof Element)) {
        return false;
      }
      if (target.isContentEditable) {
        return true;
      }
      const tagName = target.tagName;
      return tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT";
    }

    els.interstitialBtn.addEventListener("click", () => socket.emit("screen:interstitial-hold"));
    els.nextSectionBtn.addEventListener("click", () => {
      const isPreOrPost = _preMassRunning || _currentPhase === "pre" || _currentPhase === "post";
      if (isPreOrPost) {
        // Jump to first Mass section slide
        const firstMass = currentSlides.find((s) => s.phase === "mass");
        if (firstMass) {
          goToRemoteSlide(firstMass.index);
          scrollToPreview();
        }
      } else {
        // Normal: advance to next organizer group
        const currentGroupId = currentSlides[currentActive]?.organizerItemId || currentSlides[currentActive]?.id;
        const nextSlide = currentSlides.find((s) => {
          const gid = s.organizerItemId || s.id;
          return s.index > currentActive && gid !== currentGroupId;
        });
        if (nextSlide) {
          goToRemoteSlide(nextSlide.index);
          scrollToPreview();
        }
      }
    });

    els.cueList.addEventListener("click", (event) => {
      const btn = event.target.closest(".cue-btn");
      if (!btn) {
        return;
      }
      goToRemoteSlide(Number(btn.dataset.index));
      scrollToPreview();
    });

    els.carouselTrack.addEventListener("click", (event) => {
      if (Date.now() < suppressCarouselClickUntil || carouselDidSwipe) {
        return;
      }
      const card = event.target.closest(".carousel-card");
      if (!card) return;
      if (!card.dataset.index) return;
      const index = Number(card.dataset.index);
      if (!Number.isFinite(index)) return;
      const now = Date.now();
      if (lastCarouselTap.index === index && now - lastCarouselTap.at < 350) {
        goToRemoteSlide(index);
        scrollToPreview();
        carouselSelectedIndex = index;
        carouselFocusIndex = index;
        renderCarousel();
        lastCarouselTap = { index: null, at: 0 };
        return;
      }
      carouselSelectedIndex = index;
      carouselFocusIndex = index;
      renderCarousel();
      scrollToPreview();
      lastCarouselTap = { index, at: now };
    });

    document.addEventListener("keydown", (event) => {
      if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) {
        return;
      }
      if (isEditableTarget(event.target)) {
        return;
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        suppressNextCarouselAnimation = true;
        stepRemoteSlide(-1);
        return;
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        suppressNextCarouselAnimation = true;
        stepRemoteSlide(1);
      }
    });

    function moveCarouselBy(delta) {
      if (!currentSlides.length) return;
      const nextFocus = clampCarouselFocus(carouselFocusIndex + delta);
      if (nextFocus === carouselFocusIndex) {
        return;
      }
      stopCarouselMomentum();
      carouselDragOffset = 0;
      carouselFocusIndex = nextFocus;
      carouselSelectedIndex = nextFocus;
      renderCarousel();
      scrollToPreview();
    }

    function beginCarouselGesture(x, y) {
      stopCarouselMomentum();
      pinPreviewDock();
      maintainPreviewPinning(320);
      carouselDragStartX = x;
      carouselDragStartY = y;
      carouselLastPointerX = x;
      carouselLastPointerAt = performance.now();
      carouselVelocity = 0;
      carouselGestureAxis = null;
      carouselDidSwipe = false;
      els.carouselTrack.classList.add("dragging");
    }

    function updateCarouselGesture(x, y) {
      if (carouselDragStartX == null || carouselDragStartY == null || x == null || y == null) {
        return false;
      }
      const totalDeltaX = x - carouselDragStartX;
      const totalDeltaY = y - carouselDragStartY;
      if (carouselGestureAxis == null) {
        if (Math.abs(totalDeltaX) < GESTURE_AXIS_LOCK_PX && Math.abs(totalDeltaY) < GESTURE_AXIS_LOCK_PX) {
          return false;
        }
        carouselGestureAxis = Math.abs(totalDeltaX) > Math.abs(totalDeltaY) ? "x" : "y";
      }
      if (carouselGestureAxis !== "x") {
        return false;
      }
      if (Math.abs(totalDeltaX) > CAROUSEL_SWIPE_ACTIVATION_PX && Math.abs(totalDeltaX) > Math.abs(totalDeltaY)) {
        carouselDidSwipe = true;
      }
      const now = performance.now();
      const deltaX = (x - carouselLastPointerX) * CAROUSEL_DRAG_GAIN;
      pinPreviewDock();
      carouselDragOffset += deltaX;
      shiftCarouselWindowIfNeeded();
      positionCarouselCards();
      const dt = now - carouselLastPointerAt;
      carouselVelocity = dt > 0 ? deltaX / dt : 0;
      carouselLastPointerX = x;
      carouselLastPointerAt = now;
      return true;
    }

    function endCarouselGesture(x, y) {
      const handled = updateCarouselGesture(x, y);
      if (handled) {
        suppressCarouselClickUntil = Date.now() + 220;
        maintainPreviewPinning(220);
      }
      const shouldSpin = handled && Math.abs(carouselVelocity) > 0.01;
      carouselDragStartX = null;
      carouselDragStartY = null;
      carouselLastPointerX = null;
      carouselGestureAxis = null;
      els.carouselTrack.classList.remove("dragging");
      if (shouldSpin) {
        startCarouselMomentum();
        return;
      }
      settleCarousel();
    }

    if (supportsPointerEvents) {
      els.carouselTrack.addEventListener("pointerdown", (event) => {
        beginCarouselGesture(event.clientX, event.clientY);
        if (els.carouselTrack.setPointerCapture) {
          try {
            els.carouselTrack.setPointerCapture(event.pointerId);
          } catch {
            // Ignore unsupported pointer capture failures.
          }
        }
      });

      els.carouselTrack.addEventListener("pointermove", (event) => {
        if (carouselDragStartX == null || carouselDragStartY == null) return;
        const handled = updateCarouselGesture(event.clientX, event.clientY);
        if (handled) {
          event.preventDefault();
        }
      });

      els.carouselTrack.addEventListener("pointerup", (event) => {
        endCarouselGesture(event.clientX, event.clientY);
      });

      els.carouselTrack.addEventListener("pointercancel", () => {
        endCarouselGesture();
      });

      els.carouselTrack.addEventListener("pointerleave", () => {
        endCarouselGesture();
      });
    } else {
      els.carouselTrack.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        beginCarouselGesture(touch.clientX, touch.clientY);
      }, { passive: true });

      els.carouselTrack.addEventListener("touchmove", (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        const handled = updateCarouselGesture(touch.clientX, touch.clientY);
        if (handled) {
          event.preventDefault();
        }
      }, { passive: false });

      els.carouselTrack.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        endCarouselGesture(touch?.clientX, touch?.clientY);
      });

      els.carouselTrack.addEventListener("touchcancel", () => {
        endCarouselGesture();
      });
    }

    function beginPreviewGesture(x, y) {
      previewSwipeStartX = x;
      previewSwipeStartY = y;
    }

    function endPreviewGesture(x, y) {
      if (previewSwipeStartX == null || previewSwipeStartY == null || x == null || y == null) {
        previewSwipeStartX = null;
        previewSwipeStartY = null;
        return;
      }
      const deltaX = x - previewSwipeStartX;
      const deltaY = y - previewSwipeStartY;
      previewSwipeStartX = null;
      previewSwipeStartY = null;
      if (Math.abs(deltaX) < PREVIEW_SWIPE_TRIGGER_PX) return;
      if (Math.abs(deltaX) <= Math.abs(deltaY) * PREVIEW_SWIPE_DOMINANCE_RATIO) return;
      suppressNextCarouselAnimation = true;
      stepRemoteSlide(deltaX < 0 ? 1 : -1);
    }

    if (supportsPointerEvents) {
      els.screenPreviewTouch.addEventListener("pointerdown", (event) => {
        beginPreviewGesture(event.clientX, event.clientY);
        if (els.screenPreviewTouch.setPointerCapture) {
          try {
            els.screenPreviewTouch.setPointerCapture(event.pointerId);
          } catch {
            // Ignore unsupported pointer capture failures.
          }
        }
      });

      els.screenPreviewTouch.addEventListener("pointermove", (event) => {
        if (previewSwipeStartX == null || previewSwipeStartY == null) return;
        const deltaX = event.clientX - previewSwipeStartX;
        const deltaY = event.clientY - previewSwipeStartY;
        if (Math.abs(deltaX) > CAROUSEL_SWIPE_ACTIVATION_PX && Math.abs(deltaX) > Math.abs(deltaY)) {
          event.preventDefault();
        }
      });

      els.screenPreviewTouch.addEventListener("pointerup", (event) => {
        endPreviewGesture(event.clientX, event.clientY);
      });

      els.screenPreviewTouch.addEventListener("pointercancel", () => {
        endPreviewGesture();
      });
    } else {
      els.screenPreviewTouch.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        beginPreviewGesture(touch.clientX, touch.clientY);
      }, { passive: true });

      els.screenPreviewTouch.addEventListener("touchmove", (event) => {
        const touch = event.touches[0];
        if (!touch || previewSwipeStartX == null || previewSwipeStartY == null) return;
        const deltaX = touch.clientX - previewSwipeStartX;
        const deltaY = touch.clientY - previewSwipeStartY;
        if (Math.abs(deltaX) > CAROUSEL_SWIPE_ACTIVATION_PX && Math.abs(deltaX) > Math.abs(deltaY)) {
          event.preventDefault();
        }
      }, { passive: false });

      els.screenPreviewTouch.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        endPreviewGesture(touch?.clientX, touch?.clientY);
      });

      els.screenPreviewTouch.addEventListener("touchcancel", () => {
        endPreviewGesture();
      });

      els.screenPreviewTouch.addEventListener("mousedown", (event) => {
        beginPreviewGesture(event.clientX, event.clientY);
      });

      els.screenPreviewTouch.addEventListener("mousemove", (event) => {
        if (previewSwipeStartX == null || previewSwipeStartY == null) return;
        const deltaX = event.clientX - previewSwipeStartX;
        const deltaY = event.clientY - previewSwipeStartY;
        if (Math.abs(deltaX) > CAROUSEL_SWIPE_ACTIVATION_PX && Math.abs(deltaX) > Math.abs(deltaY)) {
          event.preventDefault();
        }
      });

      els.screenPreviewTouch.addEventListener("mouseup", (event) => {
        endPreviewGesture(event.clientX, event.clientY);
      });

      els.screenPreviewTouch.addEventListener("mouseleave", () => {
        endPreviewGesture();
      });
    }

    fetch("/api/state")
      .then((r) => r.json())
      .then((state) => {
        if (hasRenderedSocketState) {
          return;
        }
        render(state);
      })
      .catch(() => { });
  </script>
</body>

</html>
